<!DOCTYPE html>
<html>
<head>
    <title>Login | AI Stress Intelligence</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script defer src="{{ url_for('static', filename='app.js') }}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body style="display:flex; justify-content:center; align-items:center; height:100vh;">

<div class="card" style="width:420px; text-align:center;">

    <h2 style="margin-bottom:10px;">Welcome Back 👋</h2>
    <p style="opacity:0.8; margin-bottom:30px;">
        Login to access your AI-powered dashboard.
    </p>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               id="password"
               name="password"
               placeholder="Password"
               required>

        <button class="btn" style="width:100%; margin-top:15px;">
            Login
        </button>

    </form>

    <p style="margin-top:20px; font-size:14px;">
        Don’t have an account?
        <a href="/register" style="color:#00c6ff;">Register</a>
    </p>

</div>

</body>
</html>
